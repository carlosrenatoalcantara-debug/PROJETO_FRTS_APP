<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Estilos -->
  <defs>
    <style>
      .titulo { font-size: 24px; font-weight: bold; fill: #1a202c; }
      .subtitulo { font-size: 14px; fill: #4a5568; }
      .label { font-size: 11px; fill: #2d3748; font-weight: 500; }
      .valor { font-size: 10px; fill: #4a5568; }
      .legenda-titulo { font-size: 12px; font-weight: bold; fill: #1a202c; }
      .linha { stroke: #2d3748; stroke-width: 2; fill: none; }
      .linha-fina { stroke: #4a5568; stroke-width: 1; fill: none; }
      .caixa { stroke: #2d3748; stroke-width: 2; fill: #f7fafc; }
      .conexao { fill: #2d3748; }
    </style>

    <!-- Símbolos reutilizáveis -->
    <symbol id="disjuntor" viewBox="0 0 40 40">
      <rect class="caixa" x="5" y="5" width="30" height="30" rx="3"/>
      <circle class="conexao" cx="20" cy="10" r="3"/>
      <circle class="conexao" cx="20" cy="30" r="3"/>
      <line class="linha" x1="20" y1="10" x2="20" y2="30"/>
      <text class="label" x="20" y="22" text-anchor="middle">Q</text>
    </symbol>

    <symbol id="dr" viewBox="0 0 40 40">
      <rect class="caixa" x="5" y="5" width="30" height="30" rx="3"/>
      <circle class="conexao" cx="20" cy="10" r="3"/>
      <circle class="conexao" cx="20" cy="30" r="3"/>
      <line class="linha" x1="15" y1="15" x2="25" y2="25"/>
      <text class="label" x="20" y="22" text-anchor="middle">DR</text>
    </symbol>

    <symbol id="carregador-ac" viewBox="0 0 60 80">
      <rect class="caixa" x="5" y="10" width="50" height="60" rx="5"/>
      <circle class="conexao" cx="20" cy="15" r="2"/>
      <circle class="conexao" cx="40" cy="15" r="2"/>
      <circle class="conexao" cx="20" cy="65" r="2"/>
      <circle class="conexao" cx="40" cy="65" r="2"/>
      <text class="label" x="30" y="35" text-anchor="middle" font-size="10">AC</text>
      <text class="label" x="30" y="50" text-anchor="middle" font-size="9">15 kW</text>
      <text class="label" x="30" y="62" text-anchor="middle" font-size="8">Type 2</text>
    </symbol>

    <symbol id="carregador-dc" viewBox="0 0 60 80">
      <rect class="caixa" x="5" y="10" width="50" height="60" rx="5" fill="#e6f3ff"/>
      <circle class="conexao" cx="20" cy="15" r="2"/>
      <circle class="conexao" cx="40" cy="15" r="2"/>
      <circle class="conexao" cx="20" cy="65" r="2"/>
      <circle class="conexao" cx="40" cy="65" r="2"/>
      <text class="label" x="30" y="35" text-anchor="middle" font-size="10" fill="#1e40af">DC</text>
      <text class="label" x="30" y="50" text-anchor="middle" font-size="9" fill="#1e40af">350 kW</text>
      <text class="label" x="30" y="62" text-anchor="middle" font-size="8" fill="#1e40af">CCS Combo</text>
    </symbol>

    <symbol id="transformador" viewBox="0 0 50 50">
      <circle cx="25" cy="15" r="8" class="caixa" fill="#fff9e6"/>
      <circle cx="25" cy="35" r="8" class="caixa" fill="#fff9e6"/>
      <line class="linha-fina" x1="25" y1="23" x2="25" y2="27"/>
      <circle class="conexao" cx="25" cy="7" r="2"/>
      <circle class="conexao" cx="25" cy="43" r="2"/>
    </symbol>

    <symbol id="rede" viewBox="0 0 50 60">
      <rect class="caixa" x="5" y="5" width="40" height="50" fill="#e6f0ff"/>
      <line class="linha" x1="10" y1="15" x2="40" y2="15"/>
      <line class="linha" x1="10" y1="25" x2="40" y2="25"/>
      <line class="linha" x1="10" y1="35" x2="40" y2="35"/>
      <circle class="conexao" cx="25" cy="48" r="2"/>
      <text class="label" x="25" y="52" text-anchor="middle" font-size="9">380V</text>
    </symbol>
  </defs>

  <!-- Fundo -->
  <rect width="1400" height="900" fill="#ffffff"/>

  <!-- Cabeçalho -->
  <g id="header">
    <text class="titulo" x="50" y="40">DIAGRAMA UNIFILAR - ESTAÇÃO DE RECARGA EV</text>
    <text class="subtitulo" x="50" y="60">Fazenda Exu - Salgueiro, PE | CNPJ: 19.739.539/0001-76</text>
    <line x1="50" y1="70" x2="1350" y2="70" stroke="#cbd5e0" stroke-width="1"/>
  </g>

  <!-- Seção 1: Rede Elétrica -->
  <g id="rede-section">
    <text class="subtitulo" x="50" y="110" font-weight="bold">ALIMENTAÇÃO - REDE PÚBLICA (Cosern)</text>

    <!-- Rede -->
    <use xlink:href="#rede" x="100" y="120" width="80" height="100"/>
    <text class="label" x="140" y="250" text-anchor="middle">3F + N + PE</text>
    <text class="valor" x="140" y="265" text-anchor="middle">380V / 60Hz</text>

    <!-- Linhas até Quadro Geral -->
    <line class="linha" x1="140" y1="220" x2="140" y2="280"/>

    <!-- Quadro Geral de Distribuição (QGD) -->
    <rect class="caixa" x="100" y="280" width="80" height="80" fill="#fff5e6"/>
    <text class="label" x="140" y="310" text-anchor="middle" font-weight="bold">QGD</text>
    <text class="label" x="140" y="330" text-anchor="middle" font-size="10">630A</text>
    <text class="valor" x="140" y="350" text-anchor="middle">Curva C</text>
    <circle class="conexao" cx="140" cy="360" r="3"/>
  </g>

  <!-- Seção 2: Proteção -->
  <g id="protecao-section">
    <text class="subtitulo" x="50" y="410" font-weight="bold">PROTEÇÃO - NBR 5410:2004</text>

    <!-- DPS Principal -->
    <use xlink:href="#dr" x="100" y="420" width="50" height="50"/>
    <text class="label" x="140" y="490" text-anchor="middle" font-size="9">DR Principal</text>
    <text class="valor" x="140" y="503" text-anchor="middle" font-size="8">630A/300mA</text>

    <!-- Linhas -->
    <line class="linha" x1="140" y1="360" x2="140" y2="420"/>
    <line class="linha" x1="140" y1="470" x2="140" y2="520"/>
  </g>

  <!-- Seção 3: Distribuição para Carregadores -->
  <g id="distribuicao-section">
    <text class="subtitulo" x="50" y="560" font-weight="bold">CIRCUITOS DE DISTRIBUIÇÃO</text>

    <!-- Branch AC: Carregador AC 15kW -->
    <g id="circuito-ac">
      <line class="linha" x1="140" y1="520" x2="140" y2="560"/>
      <line class="linha" x1="140" y1="560" x2="300" y2="560"/>

      <!-- Disjuntor AC -->
      <use xlink:href="#disjuntor" x="280" y="540" width="50" height="50"/>
      <text class="label" x="320" y="595" text-anchor="middle" font-size="9">Disjuntor AC</text>
      <text class="valor" x="320" y="608" text-anchor="middle" font-size="8">32A Curva C</text>

      <line class="linha" x1="305" y1="590" x2="305" y2="630"/>

      <!-- DR AC -->
      <use xlink:href="#dr" x="280" y="630" width="50" height="50"/>
      <text class="label" x="320" y="705" text-anchor="middle" font-size="9">DR AC</text>
      <text class="valor" x="320" y="718" text-anchor="middle" font-size="8">32A/30mA</text>

      <line class="linha" x1="305" y1="680" x2="305" y2="720"/>
    </g>

    <!-- Branch DC: Carregador DC 350kW -->
    <g id="circuito-dc">
      <line class="linha" x1="140" y1="520" x2="140" y2="550"/>
      <line class="linha" x1="140" y1="550" x2="500" y2="550"/>

      <!-- Disjuntor DC -->
      <use xlink:href="#disjuntor" x="480" y="530" width="50" height="50"/>
      <text class="label" x="520" y="585" text-anchor="middle" font-size="9">Disjuntor DC</text>
      <text class="valor" x="520" y="598" text-anchor="middle" font-size="8">500A Curva C</text>

      <line class="linha" x1="505" y1="580" x2="505" y2="620"/>

      <!-- DR DC -->
      <use xlink:href="#dr" x="480" y="620" width="50" height="50"/>
      <text class="label" x="520" y="695" text-anchor="middle" font-size="9">DR DC</text>
      <text class="valor" x="520" y="708" text-anchor="middle" font-size="8">500A/300mA</text>

      <line class="linha" x1="505" y1="670" x2="505" y2="710"/>
    </g>
  </g>

  <!-- Seção 4: Carregadores -->
  <g id="carregadores-section">
    <text class="subtitulo" x="50" y="760" font-weight="bold">PONTOS DE RECARGA (2 Posições)</text>

    <!-- Carregador AC -->
    <use xlink:href="#carregador-ac" x="200" y="770" width="120" height="100"/>
    <text class="label" x="260" y="890" text-anchor="middle" font-weight="bold">Enel X Easy Next 15kW</text>

    <!-- Linhas até carregador AC -->
    <line class="linha" x1="305" y1="720" x2="305" y2="770"/>
    <line class="linha" x1="305" y1="770" x2="260" y2="770"/>

    <!-- Carregador DC -->
    <use xlink:href="#carregador-dc" x="600" y="770" width="120" height="100"/>
    <text class="label" x="660" y="890" text-anchor="middle" font-weight="bold">Evgo HyperHub DC 350kW</text>

    <!-- Linhas até carregador DC -->
    <line class="linha" x1="505" y1="710" x2="505" y2="750"/>
    <line class="linha" x1="505" y1="750" x2="660" y2="750"/>
    <line class="linha" x1="660" y1="750" x2="660" y2="770"/>
  </g>

  <!-- Especificações Técnicas -->
  <g id="especificacoes">
    <rect class="caixa" x="900" y="100" width="450" height="350" rx="5" fill="#f0f7ff" stroke="#1e40af" stroke-width="2"/>

    <text class="legenda-titulo" x="920" y="130" fill="#1e40af">ESPECIFICAÇÕES TÉCNICAS</text>
    <line x1="920" y1="140" x2="1330" y2="140" stroke="#1e40af" stroke-width="1"/>

    <!-- Potência -->
    <text class="label" x="920" y="165">Potência Total Instalada:</text>
    <text class="valor" x="920" y="180" font-weight="bold">365 kW (15 kW AC + 350 kW DC)</text>

    <text class="label" x="920" y="210">Alimentação Principal:</text>
    <text class="valor" x="920" y="225">380V / 3F+N / 60Hz / 50A</text>

    <text class="label" x="920" y="255">Proteção NBR 5410:2004:</text>
    <text class="valor" x="920" y="270">Disjuntor: 630A | DR: 300mA</text>

    <text class="label" x="920" y="300">Cabos (Fase/Neutro/Terra):</text>
    <text class="valor" x="920" y="315">50mm² - Eletroduto galvanizado 50mm</text>

    <text class="label" x="920" y="345">DPS (Surto):</text>
    <text class="valor" x="920" y="360">AC: 385kV | DC: 600V | 3 estágios</text>

    <text class="label" x="920" y="390">Aterramento:</text>
    <text class="valor" x="920" y="405">Resistência: 1.8Ω (Excelente)</text>

    <text class="label" x="920" y="435">Conformidade:</text>
    <text class="valor" x="920" y="450" fill="#228b22">✅ CONFORME - Todas as normas</text>
  </g>

  <!-- Normas Aplicadas -->
  <g id="normas">
    <rect class="caixa" x="900" y="470" width="450" height="300" rx="5" fill="#ffe6e6" stroke="#991b1b" stroke-width="2"/>

    <text class="legenda-titulo" x="920" y="500" fill="#991b1b">NORMAS APLICADAS</text>
    <line x1="920" y1="510" x2="1330" y2="510" stroke="#991b1b" stroke-width="1"/>

    <text class="valor" x="935" y="535">• ABNT NBR 17019:2022</text>
    <text class="valor" x="950" y="550">Segurança em VE e EVSE</text>

    <text class="valor" x="935" y="575">• ABNT NBR 5410:2004</text>
    <text class="valor" x="950" y="590">Instalações elétricas de baixa tensão</text>

    <text class="valor" x="935" y="615">• ABNT NBR IEC 61851-1:2021</text>
    <text class="valor" x="950" y="630">Sistema de carregamento EV</text>

    <text class="valor" x="935" y="655">• ABNT NBR IEC 62196-1/2/3:2021</text>
    <text class="valor" x="950" y="670">Conectores e interfaces</text>

    <text class="valor" x="935" y="695">• ABNT NBR IEC 62619:2021</text>
    <text class="valor" x="950" y="710">Baterias para veículos elétricos</text>

    <text class="valor" x="920" y="745" font-weight="bold" fill="#228b22">PROJETO CONFORME ✓</text>
  </g>

  <!-- Rodapé -->
  <g id="footer">
    <line x1="50" y1="820" x2="1350" y2="820" stroke="#cbd5e0" stroke-width="1"/>
    <text class="subtitulo" x="50" y="850">Responsável Técnico: Carlos Renato Alcantara | CREA: SP 123456/D</text>
    <text class="subtitulo" x="50" y="870">Data: 16/05/2026 | Projeto: Estação EV Mista - Fazenda Exu</text>
    <text class="subtitulo" x="1350" y="850" text-anchor="end" font-size="10">Gerado pelo Sistema Forte Solar | v1.0</text>
  </g>
</svg>
